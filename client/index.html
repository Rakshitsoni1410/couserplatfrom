<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Title -->
    <title>
      NextSkills | Learn Programming & Development Courses Online
    </title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="NextSkills is an online learning platform offering premium courses in MERN Stack, Full Stack Development, React, Next.js, Data Science, Python, Docker, MongoDB, and more."
    />

    <meta
      name="keywords"
      content="NextSkills, Online Courses, MERN Stack, React Course, Full Stack Development, Next.js, Programming Courses, Web Development, Data Science, Python, MongoDB, Docker"
    />

    <meta
      name="author"
      content="NextSkills"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#0f172a"
    />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://nextskills.com/"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:url"
      content="https://nextskills.com/"
    />

    <meta
      property="og:title"
      content="NextSkills | Learn Programming & Development Courses Online"
    />

    <meta
      property="og:description"
      content="Master coding and development with premium online courses from NextSkills."
    />

    <meta
      property="og:image"
      content="https://nextskills.com/og-image.png"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:url"
      content="https://nextskills.com/"
    />

    <meta
      name="twitter:title"
      content="NextSkills | Learn Programming & Development Courses Online"
    />

    <meta
      name="twitter:description"
      content="Learn MERN Stack, React, Next.js, Python, Data Science and more with NextSkills."
    />

    <meta
      name="twitter:image"
      content="https://nextskills.com/og-image.png"
    />

    <!-- Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "NextSkills",
        "url": "https://nextskills.com",
        "logo": "https://nextskills.com/logo.png",
        "sameAs": [
          "https://twitter.com/nextskills",
          "https://linkedin.com/company/nextskills",
          "https://github.com/nextskills"
        ],
        "description": "Online learning platform for programming and development courses.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
